# Ruff configuration for the ROS2 workspace
# https://docs.astral.sh/ruff/configuration/

line-length = 103  # Allow a few more characters for long lines
indent-width = 2

[lint]
select = [
  "E",  # pycodestyle errors
  "F",  # pyflakes
  "B",  # flake8-bugbear
  "I",  # isort
  "W",  # pycodestyle warnings
  "C4",  # flake8-comprehensions
  "N",  # pep8-naming
  "UP",  # pyupgrade
  "ANN",  # flake8-annotations
  "PT",  # flake8-pytest-style
  "RET",  # flake8-return
  "SIM",  # flake8-simplify
]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
